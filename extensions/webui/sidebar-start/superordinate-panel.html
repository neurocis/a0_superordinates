<html>
<head>
  <script type="module" src="/plugins/a0_superordinates/webui/superordinate-store.js"></script>
</head>
<body>
  <div x-data="{ _flatTree: [] }" x-move-after="#chats-section"
    x-effect="_flatTree = $store.superordinates?.getFlatTree($store.chats?.contexts) || []"
    class="superordinate-section">
    <template x-if="$store.superordinates && $store.chats">
      <div class="superordinate-inner">
        <div class="section-header-row">
          <h3 class="section-header">Superordinates</h3>
          <button class="btn-icon-action chat-list-action-btn" @click="$store.superordinates.newChat()" aria-label="New Chat" title="New Chat">
            <span class="material-symbols-outlined">chat_add_on</span>
          </button>
        </div>
        <ul class="config-list chats-config-list superordinate-tree"
          x-show="$store.chats.contexts.length > 0"
          @dragover.prevent.stop="">
          <template x-for="node in _flatTree" :key="node.id">
            <li :style="{ paddingLeft: (node._depth * 16) + 'px' }"
              class="tree-item"
              :class="$store.superordinates.getDropClass(node.id)"
              draggable="true"
              @dragstart.stop="$store.superordinates.dragStart(node.id, $event)"
              @dragover.prevent.stop="$store.superordinates.dragOver(node.id, $event)"
              @dragleave="$store.superordinates.dragLeave(node.id, $event)"
              @drop.prevent.stop="$store.superordinates.drop(node.id, $event, _flatTree)"
              @dragend.stop="$store.superordinates.dragEnd($event)">
              <div :class="{'chat-container': true, 'chat-selected': node.id === $store.chats.selected}"
                @click="$store.chats.selectChat(node.id)">
                <div class="chat-list-button">
                  <!-- Triangle indicator for nodes with children -->
                  <template x-if="node._hasChildren">
                    <span class="tree-toggle-indicator"
                      :style="Object.assign({}, node.project?.color ? { color: node.project.color } : { color: 'var(--color-border)' }, { transform: node._isExpanded ? 'rotate(0deg)' : 'rotate(-90deg)' })"
                      @click.stop="$store.superordinates.toggleExpand(node.id, $event)"
                      >&#x25BC;</span>
                  </template>
                  <!-- Dot indicator for leaf nodes (same as original) -->
                  <template x-if="!node._hasChildren">
                    <span :class="{'project-color-ball': true, 'heartbeat': node.running}"
                      :style="node.project?.color ? { backgroundColor: node.project.color } : { border: '1px solid var(--color-border)' }"></span>
                  </template>
                  <!-- Name: show span or inline rename input -->
                  <template x-if="$store.superordinates.renamingId !== node.id">
                    <span class="chat-name sup-name-clickable"
                      x-text="node.name ? node.name : 'Chat #' + node.no"
                      @click.stop="$store.superordinates.handleNameClick(node.id, node.name || ('Chat #' + node.no), $event)"
                      @dblclick.stop="$store.superordinates.handleNameDblClick(node.id, $event)"></span>
                  </template>
                  <template x-if="$store.superordinates.renamingId === node.id">
                    <input type="text" class="sup-rename-input"
                      x-model="$store.superordinates.renamingValue"
                      @keydown.enter.stop="$store.superordinates.commitRename()"
                      @keydown.escape.stop="$store.superordinates.cancelRename()"
                      @blur="$store.superordinates.commitRename()"
                      @click.stop />
                  </template>
                </div>
                <!-- Status indicators (independent of Chat Status Marklet) -->
                <span class="sup-running-dot" x-show="node.running" title="Process running"></span>
                <span class="sup-unseen-dot" x-show="!node.running && node._isUnseen" title="Process finished (unseen)"></span>
                <button class="btn-icon-action chat-list-action-btn" title="Close chat" @click.stop="$confirmClick($event, () => $store.chats.killChat(node.id))">
                  <span class="material-symbols-outlined">close</span>
                </button>
              </div>
            </li>
          </template>
        </ul>
      </div>
    </template>
  </div>
</body>
</html>

<style>
  /* ── Status indicator dots ────────────────────────────── */
  .sup-running-dot,
  .sup-unseen-dot {
    display: inline-block;
    flex-shrink: 0;
    border-radius: 50%;
    pointer-events: none;
    margin-right: 4px;
  }

  /* Running: pulsing blue dot */
  .sup-running-dot {
    width: 6px;
    height: 6px;
    background-color: #4361ee;
    box-shadow: 0 0 3px rgba(67, 97, 238, 0.6);
    animation: sup-pulse 1.8s ease-in-out infinite;
  }

  @keyframes sup-pulse {
    0%, 100% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 0.4;
      transform: scale(0.75);
    }
  }

  /* Finished unseen: solid green dot */
  .sup-unseen-dot {
    width: 6px;
    height: 6px;
    background-color: #2a9d8f;
    box-shadow: 0 0 3px rgba(42, 157, 143, 0.5);
  }

  /* Light mode adjustments */
  .light-mode .sup-running-dot {
    background-color: #2540b3;
    box-shadow: 0 0 3px rgba(37, 64, 179, 0.5);
  }

  .light-mode .sup-unseen-dot {
    background-color: #1a6f65;
    box-shadow: 0 0 3px rgba(26, 111, 101, 0.4);
  }

  /* Section wrapper — participates in sidebar flex chain */
  .superordinate-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1 1 auto;
    overflow: hidden;
  }

  /* Tree-specific styles */
  .superordinate-tree {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  /* Inner wrapper — must pass flex chain through template x-if */
  .superordinate-inner {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Header row — matches Chats section-header-row styling */
  .superordinate-inner .section-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    flex-shrink: 0;
    margin-bottom: var(--spacing-xs);
    z-index: 10;
  }

  .superordinate-inner .section-header {
    margin: 0;
  }

  /* Indentation is applied via inline paddingLeft on <li> */
  .tree-item {
    position: relative;
    transition: background-color 0.15s ease;
    cursor: grab;
  }

  .tree-item:active {
    cursor: grabbing;
  }

  /* Dragging state - make the source item semi-transparent */
  .tree-item.dragging {
    opacity: 0.4;
  }

  /* Drop indicator: line ABOVE the target (insert before) */
  .tree-item.drop-before::before {
    content: '';
    position: absolute;
    top: 0;
    left: 4px;
    right: 4px;
    height: 2px;
    background: var(--color-accent, #4a9eff);
    border-radius: 1px;
    z-index: 10;
    pointer-events: none;
  }

  /* Drop indicator: line BELOW the target (insert after) */
  .tree-item.drop-after::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 4px;
    right: 4px;
    height: 2px;
    background: var(--color-accent, #4a9eff);
    border-radius: 1px;
    z-index: 10;
    pointer-events: none;
  }

  /* Drop indicator: highlight for 'nest as child' */
  .tree-item.drop-child {
    background-color: rgba(74, 158, 255, 0.12);
    outline: 1px dashed var(--color-accent, #4a9eff);
    outline-offset: -1px;
    border-radius: 4px;
  }

  .tree-toggle-indicator {
    cursor: pointer;
    flex-shrink: 0;
    width: 0.6em;
    height: 0.6em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    font-size: 0.85em;
    line-height: 1;
    transition: transform 0.15s ease;
  }

  .tree-toggle-indicator:hover {
    opacity: 0.7;
  }

  /* Ensure chat-list-button gap accounts for indicator */
  .superordinate-tree .chat-list-button {
    gap: 0.35em;
  }

  /* ── Compact line height (≈60% smaller than default Chats) ──── */
  .superordinate-tree .chat-container {
    min-height: 16px;
    padding: 0 4px;
  }

  .superordinate-tree .chat-list-button {
    padding: 2px 4px;
    font-size: 0.82em;
    line-height: 1.3;
  }

  .superordinate-tree .chat-name {
    font-size: 0.82em;
    line-height: 1.3;
  }

  .superordinate-tree .chat-list-action-btn {
    padding: 1px;
    width: 18px;
    height: 18px;
    min-width: 18px;
    min-height: 18px;
  }

  .superordinate-tree .chat-list-action-btn .material-symbols-outlined {
    font-size: 14px;
  }

  .superordinate-tree .project-color-ball {
    width: 5px;
    height: 5px;
    min-width: 5px;
    min-height: 5px;
  }

  .superordinate-tree .tree-toggle-indicator {
    width: 0.5em;
    height: 0.5em;
    font-size: 0.75em;
  }

  .superordinate-tree .sup-running-dot,
  .superordinate-tree .sup-unseen-dot {
    width: 5px;
    height: 5px;
  }

  .superordinate-tree li {
    padding-top: 0;
    padding-bottom: 0;
    margin: 0;
  }

  .superordinate-tree ul {
    padding: 0;
    margin: 0;
    list-style: none;
  }

  /* Prevent text selection during drag */
  .superordinate-tree.dragging-active,
  .superordinate-tree.dragging-active * {
    user-select: none !important;
  }
  /* ── Inline rename ──────────────────────────────────── */
  .sup-name-clickable {
    cursor: pointer;
    user-select: none;
  }

  .sup-rename-input {
    background: var(--color-bg-input, var(--color-bg-secondary, #1a1a2e));
    color: var(--color-text, #e0e0e0);
    border: 1px solid var(--color-accent, #4a9eff);
    border-radius: 3px;
    font: inherit;
    font-size: inherit;
    line-height: inherit;
    padding: 0 4px;
    margin: 0;
    width: 100%;
    min-width: 0;
    outline: none;
    box-sizing: border-box;
  }

  .sup-rename-input:focus {
    box-shadow: 0 0 0 1px var(--color-accent, #4a9eff);
  }
</style>
