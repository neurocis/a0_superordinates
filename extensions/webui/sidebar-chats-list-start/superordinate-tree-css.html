<html>
<head>
  <script type="module">
    import { store } from "/plugins/a0_superordinates/webui/superordinate-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.superordinates">
      <div
        class="superordinate-tree-anchor"
        x-create="$store.superordinates.onOpen()"
        x-destroy="$store.superordinates.cleanup()"
      ></div>
    </template>
  </div>

  <style>
    .superordinate-tree-anchor {
      display: none;
    }

    /* Triangle toggle indicator for parent nodes */
    .project-color-ball.sup-tree-toggle {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .project-color-ball.sup-tree-toggle:hover {
      opacity: 0.7;
      transform: scale(1.3);
    }

    /* Indentation for child nodes */
    .chats-config-list li {
      transition: padding-left 0.15s ease;
    }
  </style>
</body>
</html>
