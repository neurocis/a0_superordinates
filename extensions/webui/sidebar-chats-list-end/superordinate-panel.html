<html>
<head>
  <script type="module">
    import { store } from "/plugins/a0_superordinates/webui/superordinate-store.js";
  </script>
</head>
<body>
  <div x-data>
    <template x-if="$store.superordinateStore">
      <div x-init="$store.superordinateStore.onOpen()" x-destroy="$store.superordinateStore.cleanup()">
        <div x-show="$store.superordinateStore.isOpen" x-cloak>
          <div class="sidebar-header">
            <h3>SuperOrdinate Hierarchy</h3>
          </div>
          <div class="sidebar-content" x-ref="content">
            <template x-for="(node, index) in $store.superordinateStore.flatTree" :key="index">
              <div 
                :class="{
                  'superordinate-node': true,
                  'is-expanded': node.expanded,
                  'has-children': node.children.length > 0
                }"
                @click.stop="$store.superordinateStore.toggleExpand(node.ctxid)"
                :style="{ paddingLeft: (node.depth * 16) + 'px' }"
              >
                <span 
                  class="tree-toggle-indicator"
                  :class="{ rotated: node.expanded && node.children.length > 0 }"
                ></span>
                <span class="node-label">
                  <template x-if="node.name">
                    {{ node.name }} (<span class="node-profile">{{ node.profile }}</span>)
                  </template>
                  <template x-else>
                    Unknown
                  </template>
                </span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>
</body>
</html>

<style>
  .superordinate-node {
    display: flex;
    align-items: center;
    padding: 4px 0;
    cursor: pointer;
    user-select: none;
  }
  .superordinate-node:hover {
    background-color: rgba(0,0,0,0.05);
  }
  .tree-toggle-indicator {
    width: 12px;
    height: 12px;
    border-left: 2px solid #666;
    border-bottom: 2px solid #666;
    margin-right: 8px;
    transition: transform 0.15s ease;
  }
  .tree-toggle-indicator.rotated {
    transform: rotate(45deg);
  }
  .node-label {
    flex: 1;
    font-size: 14px;
  }
  .node-profile {
    font-size: 12px;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .has-children {
    font-weight: 500;
  }
  .sidebar-header {
    padding: 8px 12px;
    border-bottom: 1px solid #eee;
  }
  .sidebar-header h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
  }
  .sidebar-content {
    max-height: calc(100vh - 200px);
    overflow-y: auto;
    padding: 4px 0;
  }
</style>
