<html>
<head></head>
<body>
  <!--
    Sidebar resize handle CSS.
    The handle element is created and positioned by the superordinate store's
    init() → _scheduleMountResizeHandle() → _mountResizeHandle().
    This extension only provides the global CSS needed during a resize drag.
  -->
</body>
</html>

<style>
  /* Prevent text selection and pointer events during sidebar resize */
  body.sidebar-resizing {
    cursor: col-resize !important;
    user-select: none !important;
    -webkit-user-select: none !important;
  }
  body.sidebar-resizing * {
    cursor: col-resize !important;
  }
  body.sidebar-resizing iframe {
    pointer-events: none !important;
  }
</style>
