<html>
<head></head>
<body>
  <!--
    Sidebar resize handle — lightweight trigger.
    The actual handle element is created and managed entirely by JS
    (appended to document.body with position:fixed) to bypass all
    x-extension/x-component CSS positioning chain issues.
  -->
  <div x-data x-init="$store.superordinates?._mountResizeHandle()"></div>
</body>
</html>

<style>
  /* Prevent text selection and pointer events during sidebar resize */
  body.sidebar-resizing {
    cursor: col-resize !important;
    user-select: none !important;
    -webkit-user-select: none !important;
  }
  body.sidebar-resizing * {
    cursor: col-resize !important;
  }
  body.sidebar-resizing iframe {
    pointer-events: none !important;
  }
</style>
